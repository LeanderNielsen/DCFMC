# GitHub Actions workflow — kører automatisk når der pushes til main branchen
# Bygger alle 4 Docker images og pusher dem til Docker Hub
name: Build and Push Docker Images

# Trigger — kør workflow når der pushes til main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    # Kør på GitHub's Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Hent koden fra repository
      - name: Checkout kode
        uses: actions/checkout@v3

      # Log ind på Docker Hub med secrets fra GitHub repository settings
      # DOCKER_USERNAME og DOCKER_TOKEN er sat under Settings -> Secrets -> Actions
      - name: Log ind på Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Byg Minecraft image fra Dockerfile2.txt og push til Docker Hub
      - name: Byg og push Minecraft image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.minecraft
          push: true
          tags: leanderfn/minecraft:latest

      # Byg Nginx image fra Dockerfile.nginx og push til Docker Hub
      - name: Byg og push Nginx image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: leanderfn/nginx-mc:latest

      # Byg Python whitelist-sync image fra Dockerfile.python og push til Docker Hub
      - name: Byg og push Whitelist-sync image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.python
          push: true
          tags: leanderfn/whitelist-sync:latest

      # Byg MariaDB image fra Dockerfile.mariadb og push til Docker Hub
      - name: Byg og push MariaDB image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.mariadb
          push: true
          tags: leanderfn/mariadb-mc:latest
