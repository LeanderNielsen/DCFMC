name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Log ind på Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Byg og push Minecraft image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile2.txt
          push: true
          tags: leanderfn/minecraft:latest

      - name: Byg og push Nginx image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: leanderfn/nginx-mc:latest

      - name: Byg og push Whitelist-sync image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.python
          push: true
          tags: leanderfn/whitelist-sync:latest

      - name: Byg og push MariaDB image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.mariadb
          push: true
          tags: leanderfn/mariadb-mc:latest
